id: cable
name: Cable
sources:
  docs_url: https://docs.cable.tech/
  llms_url: https://docs.cable.tech/v-2-0/llms.txt
  mcp_url: https://docs.cable.tech/v-2-0/_mcp/server
  openapi_urls:
    - https://docs.cable.tech/openapi/api-reference.json
    - https://docs.cable.tech/openapi/customer-data-api.json
    - https://docs.cable.tech/openapi/transaction-data-api.json
auth:
  type: token_exchange
  refresh_token_env: CABLE_AUTH_TOKEN
  access_token_env: CABLE_API_TOKEN
  organization_id_env: CABLE_ORGANIZATION_ID
  token_operation: api-reference:request-token
  token_response_field: token
  default_expiry_seconds: 86400
  default_scopes:
    - transactions:read
policy:
  default_write: confirm
output:
  default_format: json
